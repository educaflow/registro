<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro completado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 text-center">

            <div class="card shadow-sm">
                <div class="card-body p-5">

                    <div class="mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72"
                             fill="currentColor" class="text-success" viewBox="0 0 16 16">
                            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                        </svg>
                    </div>

                    <h2 class="fw-bold mb-2">¡Registro completado!</h2>
                    <p class="text-muted mb-4">
                        Tu cuenta ha sido creada correctamente.<br>
                        Ya puedes acceder a la aplicación con tu email y contraseña.
                    </p>

                    <a th:href="@{/registro}" class="btn btn-outline-primary">
                        Registrar otro usuario
                    </a>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
