<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro de usuarios</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="text-center mb-4">
                <h2 class="fw-bold">Registro de usuarios</h2>
                <p class="text-muted">Paso 1 de 2 — Verificación de documento</p>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                    <form th:action="@{/registro/verificar}" method="post" novalidate>

                        <div class="mb-3">
                            <label for="tipoDocumento" class="form-label fw-semibold">Tipo de documento</label>
                            <select id="tipoDocumento" name="tipoDocumento" class="form-select" required>
                                <option value="" disabled selected>Selecciona un tipo...</option>
                                <option th:each="tipo : ${tiposDocumento}"
                                        th:value="${tipo.name()}"
                                        th:text="${tipo.label}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="documento" class="form-label fw-semibold">Número de documento</label>
                            <input type="text" id="documento" name="documento"
                                   class="form-control text-uppercase"
                                   placeholder="Ej: 12345678A"
                                   required autocomplete="off">
                        </div>

                        <div class="mb-4">
                            <label for="centroId" class="form-label fw-semibold">Centro</label>
                            <select id="centroId" name="centroId" class="form-select" required>
                                <option value="" disabled selected>Selecciona un centro...</option>
                                <option th:each="centro : ${centros}"
                                        th:value="${centro.id}"
                                        th:text="${centro.name}"></option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                Continuar →
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
