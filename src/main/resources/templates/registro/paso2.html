<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro de usuarios</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="text-center mb-4">
                <h2 class="fw-bold">Registro de usuarios</h2>
                <p class="text-muted">Paso 2 de 2 — Datos personales</p>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                    <!-- Alerta resultado del lookup -->
                    <div th:if="${lookupMensaje != null}"
                         th:classappend="${lookupFound and lookupCursoActual} ? 'alert-success' : (${lookupFound} ? 'alert-warning' : 'alert-secondary')"
                         class="alert d-flex align-items-center gap-2" role="alert">
                        <svg th:if="${lookupFound and lookupCursoActual}" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                        </svg>
                        <svg th:if="${lookupFound and !lookupCursoActual}" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                            <path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/>
                        </svg>
                        <svg th:if="${!lookupFound}" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                            <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
                        </svg>
                        <span th:text="${lookupMensaje}"></span>
                    </div>

                    <form th:action="@{/registro}" method="post" novalidate>

                        <!-- Campos ocultos del paso 1 -->
                        <input type="hidden" name="documento" th:value="${documento}">
                        <input type="hidden" name="tipoDocumento" th:value="${tipoDocumento}">
                        <input type="hidden" name="centroId" th:value="${centroId}">

                        <div class="row mb-3">
                            <div class="col">
                                <label for="nombre" class="form-label fw-semibold">Nombre</label>
                                <input type="text" id="nombre" name="nombre" class="form-control"
                                       th:value="${form != null ? form.nombre : ''}"
                                       placeholder="Tu nombre" required>
                            </div>
                            <div class="col">
                                <label for="apellidos" class="form-label fw-semibold">Apellidos</label>
                                <input type="text" id="apellidos" name="apellidos" class="form-control"
                                       th:value="${form != null ? form.apellidos : ''}"
                                       placeholder="Tus apellidos" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email (será tu usuario)</label>
                            <input type="email" id="email" name="email" class="form-control"
                                   th:value="${form != null ? form.email : ''}"
                                   placeholder="correo@ejemplo.com" required autocomplete="email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tipo de usuario</label>
                            <div th:if="${tiposUsuario.isEmpty()}" class="text-muted small">
                                No hay tipos de usuario disponibles.
                            </div>
                            <div th:each="tipo : ${tiposUsuario}" class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       name="tiposUsuarioIds"
                                       th:id="'tipo_' + ${tipo.id}"
                                       th:value="${tipo.id}"
                                       th:checked="${sugeridosTiposUsuarioIds != null
                                                     && sugeridosTiposUsuarioIds.contains(tipo.id)}">
                                <label class="form-check-label"
                                       th:for="'tipo_' + ${tipo.id}"
                                       th:text="${tipo.name}">
                                </label>
                            </div>
                            <div class="form-text">Puedes seleccionar más de uno.</div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Contraseña</label>
                            <input type="password" id="password" name="password" class="form-control"
                                   placeholder="Mínimo 4 caracteres" required minlength="4" autocomplete="new-password">
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label fw-semibold">Confirmar contraseña</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                                   placeholder="Repite la contraseña" required autocomplete="new-password">
                        </div>

                        <div class="d-flex gap-2">
                            <a th:href="@{/registro}" class="btn btn-outline-secondary flex-fill">
                                ← Volver
                            </a>
                            <button type="submit" class="btn btn-success flex-fill btn-lg">
                                Registrarse
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Validación client-side de contraseñas
    document.querySelector('form').addEventListener('submit', function (e) {
        const pwd = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        if (pwd !== confirm) {
            e.preventDefault();
            document.getElementById('confirmPassword').setCustomValidity('Las contraseñas no coinciden');
            document.getElementById('confirmPassword').reportValidity();
        } else {
            document.getElementById('confirmPassword').setCustomValidity('');
        }
    });
</script>
</body>
</html>
